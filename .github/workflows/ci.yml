name: CI

# Run the quality gate on every pull request and on every push to main.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Quality gate (Pint · PHPStan · Pest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build the dev image with BuildKit layer cache to speed up subsequent runs.
      - name: Build dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: dev
          push: false
          load: true
          tags: revoco-app:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Install Composer dependencies inside the dev image.
      - name: Install Composer dependencies
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            revoco-app:dev \
            composer install --no-dev --optimize-autoloader --no-interaction --no-progress --prefer-dist

      # Install dev tools (Pint, PHPStan, Pest) — these are dev dependencies.
      - name: Install dev Composer dependencies
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            revoco-app:dev \
            composer install --no-interaction --no-progress --prefer-dist

      # Install Node dependencies and build front-end assets (needed for view cache).
      - name: Install npm dependencies and build assets
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            node:24-alpine \
            sh -c "npm ci && npm run build"

      # Run the full quality gate via Task (Pint --test, PHPStan max, Pest).
      # `task check` uses `docker compose run --rm --no-deps app` internally;
      # in CI we call each tool directly to avoid spinning up compose services.
      - name: Set up .env for tests
        run: |
          cp .env.example .env
          APP_KEY=$(docker run --rm revoco-app:dev php artisan key:generate --show 2>/dev/null | tail -1)
          echo "APP_KEY=$APP_KEY" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env
          # Pin the test-behaviour drivers so .env.example's prod values
          # (QUEUE_CONNECTION=database, APP_ENV, etc.) can't shadow the suite.
          # docker --env-file is last-wins, so these override the prod defaults.
          echo "APP_ENV=testing" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "MAIL_MAILER=array" >> .env

      - name: Run Pint (style check)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            revoco-app:dev \
            ./vendor/bin/pint --test

      - name: Run PHPStan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            revoco-app:dev \
            ./vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Run Pest
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            -e APP_KEY \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=:memory: \
            --env-file .env \
            revoco-app:dev \
            ./vendor/bin/pest
