name: CI

# Run the quality gate on every pull request and on every push to main.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Quality gate (Pint · PHPStan · Pest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build the dev image with BuildKit layer cache to speed up subsequent runs.
      - name: Build dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: dev
          push: false
          load: true
          tags: revoco-app:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Install Composer dependencies inside the dev image.
      - name: Install Composer dependencies
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            revoco-app:dev \
            composer install --no-dev --optimize-autoloader --no-interaction --no-progress --prefer-dist

      # Install dev tools (Pint, PHPStan, Pest) — these are dev dependencies.
      - name: Install dev Composer dependencies
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            revoco-app:dev \
            composer install --no-interaction --no-progress --prefer-dist

      # Install Node dependencies and build front-end assets (needed for view cache).
      - name: Install npm dependencies and build assets
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            node:24-alpine \
            sh -c "npm ci && npm run build"

      # Run the full quality gate via Task (Pint --test, PHPStan max, Pest).
      # `task check` uses `docker compose run --rm --no-deps app` internally;
      # in CI we call each tool directly to avoid spinning up compose services.
      # Provide an APP_KEY via the .env file (Laravel's Dotenv loads it but respects
      # values already set, so it never shadows phpunit.xml). Test-behaviour drivers
      # are pinned on the Pest run below via -e — NOT here and NOT via --env-file,
      # because real env vars (unlike a .env file) WOULD shadow phpunit.
      - name: Provide APP_KEY for tests
        run: |
          cp .env.example .env
          APP_KEY=$(docker run --rm revoco-app:dev php artisan key:generate --show 2>/dev/null | tail -1)
          echo "APP_KEY=$APP_KEY" >> .env

      - name: Run Pint (style check)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            revoco-app:dev \
            ./vendor/bin/pint --test

      - name: Run PHPStan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            revoco-app:dev \
            ./vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      # Pin only the behaviour drivers (mirrors the local `RUN_TEST` Taskfile var).
      # DB is left to phpunit.xml (:memory:) — passing DB_DATABASE=:memory: as a real
      # env var breaks the in-memory connection sharing. No --env-file (it would
      # inject .env.example's prod drivers as real env and shadow the suite).
      - name: Run Pest
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/www/html \
            -w /var/www/html \
            -e APP_ENV=testing \
            -e QUEUE_CONNECTION=sync \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            -e MAIL_MAILER=array \
            revoco-app:dev \
            ./vendor/bin/pest
