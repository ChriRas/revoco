name: Release

# Build, smoke-test, and push the prod image to ghcr.io on a SemVer tag (v*).
on:
  push:
    tags:
      - 'v[0-9]*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build · Smoke · Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the image name and tags. GHCR namespaces must be lowercase, but
      # github.repository_owner preserves the login's case — so lowercase it here.
      - name: Compute image name and tags
        id: meta
        run: |
          IMAGE_NAME="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/revoco"   # e.g. ghcr.io/chriras/revoco
          RAW_TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          SEMVER="${RAW_TAG#v}"                 # e.g. 1.2.3
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_NAME}:${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "image_tag_latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      # Build the prod image locally first (--load) so we can smoke-test before
      # pushing. Tag it with the exact name the smoke compose resolves below
      # (REVOCO_IMAGE_OWNER=local, REVOCO_IMAGE_TAG=smoke) so `--no-build` finds it
      # locally instead of trying to pull a non-existent manifest.
      - name: Build prod image (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: prod
          push: false
          load: true
          tags: ghcr.io/local/revoco:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test: boot the generic prod stack, curl / → 200, then tear down.
      - name: Smoke test
        run: |
          SMOKE_KEY="base64:$(openssl rand -base64 32)"

          # Boot with the locally-built image (no-build, no dev override).
          APP_KEY="$SMOKE_KEY" \
          APP_PORT=18580 \
          REVOCO_IMAGE_OWNER=local \
          REVOCO_IMAGE_TAG=smoke \
          docker compose -f docker-compose.yml -p revoco-smoke up -d --no-build

          echo "Waiting for app to boot (migrations + caches)..."
          for i in $(seq 1 20); do
            STATUS=$(docker run --rm --network revoco-smoke_default alpine \
              sh -c 'wget -S -qO/dev/null http://web/ 2>&1 | grep "HTTP/" | tail -1 | awk "{print \$2}"' 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "Smoke PASSED: HTTP 200"
              break
            fi
            echo "  attempt $i/20 — status='$STATUS', waiting 3s..."
            sleep 3
          done

          if [ "$STATUS" != "200" ]; then
            echo "Smoke FAILED: expected 200, last status='$STATUS'" >&2
            docker compose -f docker-compose.yml -p revoco-smoke logs
            docker compose -f docker-compose.yml -p revoco-smoke down -v
            exit 1
          fi

          docker compose -f docker-compose.yml -p revoco-smoke down -v

      # Push to ghcr.io with SemVer + latest tags.
      - name: Push prod image to ghcr.io
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
