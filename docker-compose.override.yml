# Development overlay — auto-merged by Docker Compose when no `-f` flag is used.
#
# Plain `docker compose up` (or `task up`) → dev stack.
# Prod stack → `docker compose -f docker-compose.yml up` (no overlay).
#
# Volume merge behaviour: Compose merges volumes additively, but when two
# entries have the same `target`, the override entry wins. The bind-mounts
# below shadow the Named Volumes defined in the prod base file, so dev
# containers use the host filesystem instead of the app_storage/app_public
# volumes.

# Shared dev-worker definition (queue + scheduler both use the dev image,
# no prod entrypoint, source bind-mounted). Anchored here; merged via <<.
x-dev-worker: &dev-worker
  build:
    context: .
    dockerfile: docker/Dockerfile
    target: dev
  image: revoco-app:dev
  profiles: ["tools"]
  entrypoint: []
  volumes:
    - .:/var/www/html
    - ./storage:/var/www/html/storage

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    image: revoco-app:dev
    # Override entrypoint: in dev the source is bind-mounted — skip the prod
    # entrypoint (storage/migrate/cache) and go straight to php-fpm.
    entrypoint: []
    command: ["php-fpm"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      # In dev, SQLite lives in database/database.sqlite (Laravel's default path inside
      # the bind-mounted source). Override the prod path from the base compose file.
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      # Full source bind-mount. Covers storage/ and public/build — these bind-
      # mounts shadow the prod Named Volume mounts at the same target paths.
      - .:/var/www/html
      # Explicitly shadow the Named Volume mounts with host paths so the prod
      # volumes are not created / written in dev.
      - ./storage:/var/www/html/storage
      - ./public/build:/var/www/html/public/build

  web:
    volumes:
      # In dev the full repo is bind-mounted — nginx reads public/ directly.
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Shadow the app_public volume mount with the host build dir.
      - ./public/build:/var/www/html/public/build:ro

  # queue and scheduler are not started in dev — profiled "tools", dev image only.
  queue:
    <<: *dev-worker

  scheduler:
    <<: *dev-worker

  node:
    image: node:24-alpine
    profiles: ["tools"]
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
