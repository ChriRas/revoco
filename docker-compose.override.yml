# Development overlay — auto-merged by Docker Compose when no `-f` flag is used.
#
# Plain `docker compose up` (or `task up`) → dev stack.
# Prod stack → `docker compose -f docker-compose.yml up` (no overlay).
#
# Volume merge behaviour: Compose merges volumes additively, but when two
# entries have the same `target`, the override entry wins. The bind-mounts
# below shadow the Named Volumes defined in the prod base file, so dev
# containers use the host filesystem instead of the app_storage/app_public
# volumes.

# Shared dev-worker definition (queue + scheduler both use the dev image,
# no prod entrypoint, source bind-mounted). Anchored here; merged via <<.
x-dev-worker: &dev-worker
  build:
    context: .
    dockerfile: docker/Dockerfile
    target: dev
  image: revoco-app:dev
  profiles: ["tools"]
  entrypoint: []
  volumes:
    - .:/var/www/html
    - ./storage:/var/www/html/storage

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    image: revoco-app:dev
    # Override entrypoint: in dev the source is bind-mounted — skip the prod
    # entrypoint (storage/migrate/cache) and go straight to php-fpm.
    entrypoint: []
    command: ["php-fpm"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      # In dev, SQLite lives in database/database.sqlite (Laravel's default path inside
      # the bind-mounted source). Override the prod path from the base compose file.
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      # Full source bind-mount, plus explicit host mounts at the exact target
      # paths of the base file's Named Volumes (app_storage, app_public) so the
      # dev container serves the working tree. Compose only lets the override win
      # when the target matches — the bare .:/var/www/html mount is less specific
      # and does NOT override the base's app_public:/var/www/html/public mount, so
      # public/ (incl. index.php) must be shadowed explicitly here.
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./public:/var/www/html/public

  web:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Serve the repo's public/ (incl. index.php) directly in dev. This overrides
      # the base app_public:/var/www/html/public mount at the same target, which in
      # dev is empty because the prod entrypoint that syncs it is skipped. nginx's
      # document root is public/, so it needs nothing else from the repo.
      - ./public:/var/www/html/public:ro

  # queue and scheduler are not started in dev — profiled "tools", dev image only.
  queue:
    <<: *dev-worker

  scheduler:
    <<: *dev-worker

  node:
    image: node:24-alpine
    profiles: ["tools"]
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
