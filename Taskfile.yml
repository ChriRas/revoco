# Revoco task runner (https://taskfile.dev).
# All PHP/Node tooling runs inside the dev container — no local PHP/Composer/Node needed.
# Tooling tasks use `run --rm --no-deps`, so they work even when the stack is down.
version: '3'

vars:
  DC: docker compose
  EXEC: docker compose exec app
  RUN: docker compose run --rm --no-deps app
  # `run` starts the profiled `node` service on demand — no `--profile tools` needed.
  RUN_NODE: docker compose run --rm --no-deps node
  # Test runner: force the testing env so the dev container's APP_ENV=local (and the
  # dev DB path) can never shadow phpunit.xml — keeps the suite hermetic locally and
  # in CI (where task check runs in the same container).
  RUN_TEST: 'docker compose run --rm --no-deps -e APP_ENV=testing -e QUEUE_CONNECTION=sync -e CACHE_STORE=array -e SESSION_DRIVER=array -e MAIL_MAILER=array app'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  up:
    desc: Start the dev stack (builds the image on first run) — http://localhost:8580
    cmds:
      - "{{.DC}} up -d"

  down:
    desc: Stop and remove the dev stack
    cmds:
      - "{{.DC}} down"

  restart:
    desc: Restart the dev stack
    cmds:
      - "{{.DC}} restart"

  build:
    desc: (Re)build the dev image — run after changing the Dockerfile
    cmds:
      - "{{.DC}} build"

  logs:
    desc: Follow the stack logs (Ctrl-C to stop)
    cmds:
      - "{{.DC}} logs -f"

  shell:
    desc: Open a shell in the running app container (requires `task up`)
    cmds:
      - "{{.EXEC}} sh"  # Alpine image ships busybox sh, not bash

  composer:
    desc: 'Run Composer in the container — e.g. task composer -- require vendor/pkg'
    cmds:
      - "{{.RUN}} composer {{.CLI_ARGS}}"

  artisan:
    desc: 'Run Artisan — e.g. task artisan -- migrate'
    cmds:
      - "{{.RUN}} php artisan {{.CLI_ARGS}}"

  npm:
    desc: 'Run npm in the Node container — e.g. task npm -- install'
    cmds:
      - "{{.RUN_NODE}} npm {{.CLI_ARGS}}"

  dev:
    desc: Start the Vite dev server (HMR) on http://localhost:5173
    cmds:
      - "{{.DC}} run --rm --service-ports node npm run dev"

  queue:
    desc: Run the queue worker (processes withdrawal e-mails + ntfy push) — Ctrl-C to stop
    cmds:
      - "{{.RUN}} php artisan queue:work --tries=3"

  migrate:
    desc: Run database migrations
    cmds:
      - "{{.RUN}} php artisan migrate"

  fresh:
    desc: Drop all tables and re-run migrations
    cmds:
      - "{{.RUN}} php artisan migrate:fresh"

  test:
    desc: 'Run the Pest test suite — e.g. task test -- --filter=Smoke'
    cmds:
      - "{{.RUN_TEST}} ./vendor/bin/pest {{.CLI_ARGS}}"

  pint:
    desc: 'Run Laravel Pint (fixes) — use: task pint -- --test to only check'
    cmds:
      - "{{.RUN}} ./vendor/bin/pint {{.PINT_ARGS | default .CLI_ARGS}}"

  stan:
    desc: Run PHPStan/Larastan (level max)
    cmds:
      - "{{.RUN}} ./vendor/bin/phpstan analyse --no-progress --memory-limit=1G {{.CLI_ARGS}}"

  check:
    desc: Run all quality gates (Pint --test, PHPStan, Pest) — the pre-commit gate
    cmds:
      - task: pint
        vars: { PINT_ARGS: '--test' }
      - task: stan
      - task: test

  assets:
    desc: Build front-end assets with Vite
    cmds:
      - "{{.RUN_NODE}} npm run build"

  operator:
    desc: Provision or update the operator account from OPERATOR_EMAIL / OPERATOR_PASSWORD in .env (both must be set; for interactive use run `php artisan app:operator` directly)
    dotenv: ['.env']
    cmds:
      - '{{.RUN}} php artisan app:operator --email="$OPERATOR_EMAIL" --password="$OPERATOR_PASSWORD"'

  smoke:
    desc: "Smoke-test the production image: build → boot → curl / → 200 → teardown"
    vars:
      SMOKE_IMAGE: ghcr.io/local/revoco:smoke
      SMOKE_PROJECT: revoco-smoke
    cmds:
      # 1. Build the prod image (target: prod) with the name used by the smoke stack.
      - docker build --target prod -t {{.SMOKE_IMAGE}} -f docker/Dockerfile .
      # 2. Generate a throwaway APP_KEY and boot the generic prod stack.
      #    Uses the explicit -f flag so the dev override is NOT loaded.
      - |
        SMOKE_KEY="base64:$(openssl rand -base64 32)"
        APP_KEY="$SMOKE_KEY" \
        APP_PORT=18580 \
        REVOCO_IMAGE_OWNER=local \
        REVOCO_IMAGE_TAG=smoke \
        docker compose \
          -f docker-compose.yml \
          -p {{.SMOKE_PROJECT}} \
          up -d --no-build
      # 3. Wait for the app container to finish bootstrapping (migrations + caches).
      #    Poll until nginx responds or we timeout.
      - |
        echo "Waiting for prod stack to become ready..."
        for i in $(seq 1 20); do
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18580/ 2>/dev/null || true)
          if [ "$STATUS" = "200" ]; then
            echo "Stack is ready (HTTP 200)."
            break
          fi
          echo "  attempt $i/20 — status='$STATUS', waiting 3s..."
          sleep 3
        done
      # 4. Assert HTTP 200 on the form route (/).
      - |
        STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18580/ 2>/dev/null)
        echo "HTTP status: $STATUS"
        if [ "$STATUS" != "200" ]; then
          echo "SMOKE FAILED: expected 200, got $STATUS" >&2
          docker compose -f docker-compose.yml -p {{.SMOKE_PROJECT}} logs
          docker compose -f docker-compose.yml -p {{.SMOKE_PROJECT}} down -v
          exit 1
        fi
        echo "SMOKE PASSED: HTTP 200 received from the prod stack."
      # 5. Teardown.
      - >
        docker compose
          -f docker-compose.yml
          -p {{.SMOKE_PROJECT}}
          down -v

  init:
    desc: One-time bootstrap on a fresh checkout — build image, install deps, build assets
    cmds:
      - "{{.DC}} build"
      - "{{.RUN}} composer install"
      - "{{.RUN_NODE}} npm install"
      - "{{.RUN_NODE}} npm run build"
      - "{{.RUN}} php artisan key:generate"
      - "{{.RUN}} php artisan migrate"
