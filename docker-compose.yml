# Generic production stack for Revoco.
#
# Boot the full prod stack (no bind-mount):
#   APP_KEY=base64:... docker compose -f docker-compose.yml up -d
#
# Services:
#   app       — PHP-FPM (prod image); runs migrations + caches on start.
#   web       — nginx; serves static files from app_public and proxies PHP to app.
#   queue     — queue worker (same prod image, different command).
#   scheduler — schedule runner (same prod image, different command).
#
# SQLite persists on the named volume `app_storage`.
# The entire public/ directory (incl. built assets) is shared via `app_public`:
#   - On `app` start, the entrypoint syncs the baked public/ from the image into
#     the volume, then keeps running as php-fpm.
#   - `web` (nginx) mounts the same volume read-only as its document root.
#   - No bind-mount required in prod.
#
# Optional profile "ntfy" — a self-hosted ntfy instance for push notifications.
# Activate: docker compose -f docker-compose.yml --profile ntfy up -d
#
# Development overlay: `docker-compose.override.yml` (auto-merged by Docker
# Compose when no `-f` flag is given) swaps the prod image for the dev image
# and adds the source bind-mount. The Taskfile uses plain `docker compose` and
# therefore always resolves to the dev stack.

services:
  app:
    image: ghcr.io/${REVOCO_IMAGE_OWNER:-chriras}/revoco:${REVOCO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # APP_KEY — REQUIRED; container exits non-zero if missing.
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost}"
      APP_TIMEZONE: "${APP_TIMEZONE:-UTC}"
      APP_LOCALE: "${APP_LOCALE:-en}"
      APP_FALLBACK_LOCALE: "${APP_FALLBACK_LOCALE:-en}"
      APP_THEME: "${APP_THEME:-neutral}"
      REVOCO_BRAND_NAME: "${REVOCO_BRAND_NAME:-}"
      REVOCO_LOGO_URL: "${REVOCO_LOGO_URL:-}"
      REVOCO_IMPRINT_URL: "${REVOCO_IMPRINT_URL:-}"
      REVOCO_PRIVACY_URL: "${REVOCO_PRIVACY_URL:-}"
      LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
      LOG_LEVEL: "${LOG_LEVEL:-error}"
      DB_CONNECTION: sqlite
      # SQLite file lives inside the app_storage volume.
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-127.0.0.1}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-tls}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-noreply@example.com}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Revoco}"
      MERCHANT_NOTIFICATION_EMAIL: "${MERCHANT_NOTIFICATION_EMAIL:-}"
      NTFY_ENABLED: "${NTFY_ENABLED:-false}"
      NTFY_SERVER: "${NTFY_SERVER:-https://ntfy.sh}"
      NTFY_TOPIC: "${NTFY_TOPIC:-}"
      NTFY_TOKEN: "${NTFY_TOKEN:-}"
      OPERATOR_EMAIL: "${OPERATOR_EMAIL:-}"
      OPERATOR_PASSWORD: "${OPERATOR_PASSWORD:-}"
      BACKEND_LOCALE: "${BACKEND_LOCALE:-en}"
    volumes:
      # Persist SQLite + Laravel storage (cache, sessions, logs) across restarts.
      - app_storage:/var/www/html/storage
      # Share the entire public/ directory with nginx (app entrypoint syncs it on start).
      - app_public:/var/www/html/public
    restart: unless-stopped

  web:
    image: nginx:1.30-alpine
    ports:
      - "${APP_PORT:-8580}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Serve the prod public/ directory (populated by the app entrypoint).
      - app_public:/var/www/html/public:ro
    depends_on:
      - app
    restart: unless-stopped

  queue:
    image: ghcr.io/${REVOCO_IMAGE_OWNER:-chriras}/revoco:${REVOCO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    # Workers use the minimal entrypoint (APP_KEY check only; no migrations/caches).
    entrypoint: ["/usr/local/bin/entrypoint-worker.sh"]
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_TIMEZONE: "${APP_TIMEZONE:-UTC}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-127.0.0.1}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-tls}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-noreply@example.com}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-Revoco}"
      MERCHANT_NOTIFICATION_EMAIL: "${MERCHANT_NOTIFICATION_EMAIL:-}"
      NTFY_ENABLED: "${NTFY_ENABLED:-false}"
      NTFY_SERVER: "${NTFY_SERVER:-https://ntfy.sh}"
      NTFY_TOPIC: "${NTFY_TOPIC:-}"
      NTFY_TOKEN: "${NTFY_TOKEN:-}"
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
    restart: unless-stopped

  scheduler:
    image: ghcr.io/${REVOCO_IMAGE_OWNER:-chriras}/revoco:${REVOCO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    entrypoint: ["/usr/local/bin/entrypoint-worker.sh"]
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_TIMEZONE: "${APP_TIMEZONE:-UTC}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy:latest
    profiles: ["ntfy"]
    command: serve
    environment:
      # NTFY_BASE_URL must match the public URL operators use to reach ntfy (incl. port
      # if non-standard). The default http://localhost:80 does not match the published
      # NTFY_PORT (default 8484) — set NTFY_BASE_URL explicitly when using this profile.
      NTFY_BASE_URL: "${NTFY_BASE_URL:-http://localhost:${NTFY_PORT:-8484}}"
      NTFY_LISTEN_HTTP: ":80"
      NTFY_CACHE_DURATION: "12h"
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
    volumes:
      - ntfy_data:/var/lib/ntfy
    ports:
      - "${NTFY_PORT:-8484}:80"
    restart: unless-stopped

volumes:
  # Persists storage/ directory: SQLite database, sessions, cache, logs.
  app_storage:
  # Shared public/ directory: app entrypoint populates it from the image on start;
  # nginx mounts it read-only as its document root. Eliminates the need for a bind-mount.
  app_public:
  # ntfy persistent cache (only used with --profile ntfy).
  ntfy_data:
