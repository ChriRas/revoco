# Local development stack for Revoco.
# - app:  PHP 8.5 / php-fpm (Dockerfile target "dev", Alpine), source bind-mounted.
# - web:  nginx front, published on http://localhost:8580.
# - node: Node 24 build tooling (Vite). Profiled — not started by `up`, used via
#         `docker compose run --rm node ...` (see Taskfile: npm / assets / dev).
# SQLite lives as a file inside the bind-mounted repo (database/database.sqlite),
# so it persists on the host without a separate database service.
# Laravel reads the bind-mounted .env directly; no env_file needed here.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    image: revoco-app:dev
    volumes:
      - .:/var/www/html
    # php-fpm listens on :9000; reachable by the web service as "app:9000"
    # over the compose network — no host port needed.

  web:
    image: nginx:1.30-alpine
    ports:
      - "8580:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  node:
    image: node:24-alpine
    profiles: ["tools"]
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"  # Vite dev server (published only via `task dev`)
